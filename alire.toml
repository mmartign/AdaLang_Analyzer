name = "adalang_analyzer"
description = "A Libadalang-based static analyzer for Ada source code"
version = "0.1.0-dev"

authors = ["Maurizio Martignano"]
maintainers = ["Maurizio Martignano <Maurizio.Martignano@spazioit.com>"]
licenses = "GPL-3.0-or-later"
website = "https://spazioit.com/"
tags = ["ada", "analysis", "libadalang", "static-analysis"]

project-files = ["adalang_analyzer.gpr"]

executables = ["adalang_analyzer"]

[environment]
[environment.C_INCLUDE_PATH]
append = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/include"

[environment.CPLUS_INCLUDE_PATH]
append = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/include"

[environment.LIBRARY_PATH]
append = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/lib"

[[depends-on]]
libadalang = "^26.0.0"

[[depends-on]]
gnatcoll_gmp = "^26.0.0"

[[depends-on]]
gnatcoll_iconv = "^26.0.0"

[[depends-on]]
langkit_support = "^26.0.0"

[[depends-on]]
prettier_ada = "^26.0.0"

[[depends-on]]
templates_parser = "^26.0.0"
